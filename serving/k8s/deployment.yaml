apiVersion: apps/v1
kind: Deployment
metadata:
  name: pt-debugger
  namespace: pt-debugger
  labels:
    app: pt-debugger
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pt-debugger
  template:
    metadata:
      labels:
        app: pt-debugger
    spec:
      # ---------------------------------------------------------------
      # Security context — run as non-root
      # ---------------------------------------------------------------
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ---------------------------------------------------------------
      # Init container: copy/validate adapter from PVC before serving
      # ---------------------------------------------------------------
      initContainers:
        - name: adapter-check
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /model/adapter/adapter_config.json ]; then
                echo "ERROR: LoRA adapter not found at /model/adapter/"
                exit 1
              fi
              echo "Adapter found — proceeding."
          volumeMounts:
            - name: model-pvc
              mountPath: /model

      # ---------------------------------------------------------------
      # Main serving container
      # ---------------------------------------------------------------
      containers:
        - name: pt-debugger
          # Replace with your internal registry image
          image: your-registry/pt-debugger:1.0.0
          imagePullPolicy: Always

          command:
            - bash
            - -c
            - |
              # Start FastAPI REST API in background
              uvicorn serving.api:app \
                --host 0.0.0.0 \
                --port "${API_PORT}" \
                --workers 1 &
              # Start Gradio UI in foreground
              python serving/app.py \
                --model_path "${MODEL_PATH}" \
                --adapter_path "${ADAPTER_PATH}" \
                --device "${DEVICE}" \
                --max_new_tokens "${MAX_NEW_TOKENS}" \
                --port "${GRADIO_PORT}"

          ports:
            - name: api
              containerPort: 8000
              protocol: TCP
            - name: gradio
              containerPort: 7860
              protocol: TCP

          envFrom:
            - configMapRef:
                name: pt-debugger-config

          # Gaudi2 resource request — remove/replace for NVIDIA
          resources:
            limits:
              habana.ai/gaudi: "1"
              memory: "32Gi"
              cpu: "8"
            requests:
              habana.ai/gaudi: "1"
              memory: "24Gi"
              cpu: "4"

          volumeMounts:
            - name: model-pvc
              mountPath: /model
              readOnly: true

          # ---------------------------------------------------------------
          # Health probes
          # ---------------------------------------------------------------
          startupProbe:
            httpGet:
              path: /ready
              port: api
            failureThreshold: 60   # Allow up to 5 min for model load
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: api
            periodSeconds: 10
            failureThreshold: 3

          # ---------------------------------------------------------------
          # Security
          # ---------------------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Gradio/HF cache writes to /tmp
            capabilities:
              drop:
                - ALL

      # ---------------------------------------------------------------
      # Volumes
      # ---------------------------------------------------------------
      volumes:
        - name: model-pvc
          persistentVolumeClaim:
            claimName: pt-debugger-model-pvc

      # Schedule on Gaudi2 nodes
      nodeSelector:
        habana.ai/gaudi: "true"

      tolerations:
        - key: "habana.ai/gaudi"
          operator: "Exists"
          effect: "NoSchedule"
